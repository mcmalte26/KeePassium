name: Build iOS App

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    name: Build and Export IPA
    runs-on: macos-latest
    
    strategy:
      matrix:
        scheme:
          - KeePassium
        configuration:
          - Debug

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Display Xcode version
        run: xcodebuild -version

      - name: Create build directory
        run: mkdir -p build

      - name: Archive ${{ matrix.scheme }}
        run: |
          xcodebuild \
            -workspace KeePassium.xcworkspace \
            -scheme "${{ matrix.scheme }}" \
            -configuration "${{ matrix.configuration }}" \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath "build/${{ matrix.scheme }}.xcarchive" \
            -derivedDataPath build/DerivedData \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Automatic \
            -verbose \
            archive

      - name: Create unsigned IPA for ${{ matrix.scheme }}
        run: |
          set -e
          # Extract app from archive
          ARCHIVE="build/${{ matrix.scheme }}.xcarchive"
          APP_BUNDLE="$ARCHIVE/Products/Applications"
          APP_NAME="${{ matrix.scheme }}.app"
          
          # Find the app
          if [ ! -d "$APP_BUNDLE/$APP_NAME" ]; then
            echo "App bundle not found at $APP_BUNDLE/$APP_NAME"
            ls -la "$APP_BUNDLE/" || echo "Directory doesn't exist"
            exit 1
          fi
          
          # Create IPA structure
          IPA_STAGING=$(mktemp -d)
          mkdir -p "$IPA_STAGING/Payload"
          cp -r "$APP_BUNDLE/$APP_NAME" "$IPA_STAGING/Payload/"
          
          # Create unsigned IPA (just a zip file)
          cd "$IPA_STAGING"
          zip -r "build/${{ matrix.scheme }}-${{ matrix.configuration }}.ipa" Payload/
          cd - > /dev/null
          
          echo "Created unsigned IPA: build/${{ matrix.scheme }}-${{ matrix.configuration }}.ipa"
          ls -lh "build/${{ matrix.scheme }}-${{ matrix.configuration }}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scheme }}-${{ matrix.configuration }}-ipa
          path: build/${{ matrix.scheme }}-${{ matrix.configuration }}.ipa
          if-no-files-found: warn

      - name: Upload Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scheme }}-${{ matrix.configuration }}-xcarchive
          path: build/${{ matrix.scheme }}.xcarchive
          if-no-files-found: warn

  test:
    name: Run Tests
    runs-on: macos-latest
    if: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Display Xcode version
        run: xcodebuild -version

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -workspace KeePassium.xcworkspace \
            -scheme KeePassium \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build \
            -verbose \
            test
